name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing

      - name: Smoke-test data generator
        run: |
          python -c "
          import sys; sys.path.insert(0, 'src')
          from data_generator import ToolWearGenerator
          df = ToolWearGenerator(n_tools=3).generate()
          assert len(df) > 0
          assert set(df['wear_state'].unique()) <= {'Fresh', 'Worn', 'Critical'}
          print('Generator smoke test passed:', df.shape)
          "
